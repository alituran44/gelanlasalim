<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Yönetim Paneli | gelanlasalim.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ═══════════════════════════════════════════════════════
           DESIGN TOKENS
           ═══════════════════════════════════════════════════════ */
        :root {
            --bg-deep:    #070a13;
            --bg-card:    #0d1117;
            --bg-card-alt:#131922;
            --bg-input:   #161b22;
            --border:     #21262d;
            --border-focus:#0d9488;
            --accent:     #0d9488;
            --accent-l:   #14b8a6;
            --accent-glow: rgba(13,148,136,.15);
            --text-1:     #e6edf3;
            --text-2:     #8b949e;
            --text-3:     #484f58;
            --red:        #f85149;
            --red-bg:     rgba(248,81,73,.12);
            --green:      #3fb950;
            --green-bg:   rgba(63,185,80,.12);
            --yellow:     #d29922;
            --sidebar-w:  272px;
            --topbar-h:   64px;
            --radius-sm:  6px;
            --radius-md:  10px;
            --radius-lg:  16px;
        }

        /* ═══════════════════════════════════════════════════════
           RESET & BASE
           ═══════════════════════════════════════════════════════ */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        html {
            font-size: 15px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-1);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1,h2,h3,h4,h5,h6 { font-family: 'Outfit', sans-serif; font-weight: 700; line-height: 1.25; }

        a { color: var(--accent-l); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ═══════════════════════════════════════════════════════
           LOGIN SCREEN
           ═══════════════════════════════════════════════════════ */
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background:
                radial-gradient(ellipse 600px 400px at 30% 20%, rgba(13,148,136,.08), transparent),
                radial-gradient(ellipse 500px 500px at 70% 80%, rgba(13,148,136,.05), transparent),
                var(--bg-deep);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-l));
        }

        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-brand .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: -0.5px;
        }

        .login-brand .logo-text span { color: var(--accent-l); }

        .login-brand .logo-sub {
            display: inline-block;
            margin-top: 6px;
            font-size: .7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .login-card h2 {
            font-size: 1.35rem;
            margin-bottom: 8px;
            text-align: center;
        }

        .login-card .login-desc {
            color: var(--text-2);
            font-size: .85rem;
            text-align: center;
            margin-bottom: 32px;
        }

        .field-group {
            margin-bottom: 20px;
        }

        .field-group label {
            display: block;
            font-size: .78rem;
            font-weight: 600;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 8px;
        }

        .field-group input,
        .cms-input,
        .cms-textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-1);
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            transition: border-color .2s, box-shadow .2s;
            outline: none;
        }

        .field-group input:focus,
        .cms-input:focus,
        .cms-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .cms-textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.55;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Outfit', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .1s;
            margin-top: 8px;
        }

        .login-btn:hover { background: var(--accent-l); }
        .login-btn:active { transform: scale(.98); }
        .login-btn:disabled { opacity: .5; cursor: not-allowed; }

        .login-error {
            background: var(--red-bg);
            border: 1px solid rgba(248,81,73,.3);
            color: var(--red);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: .82rem;
            margin-bottom: 16px;
            display: none;
        }

        .quick-login {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .quick-login button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-2);
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: .82rem;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }

        .quick-login button:hover {
            border-color: var(--accent);
            color: var(--accent-l);
        }

        /* ═══════════════════════════════════════════════════════
           APP SHELL
           ═══════════════════════════════════════════════════════ */
        #appShell { display: none; }

        /* TOPBAR */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--topbar-h);
            background: rgba(13,17,23,.85);
            backdrop-filter: blur(16px) saturate(1.6);
            -webkit-backdrop-filter: blur(16px) saturate(1.6);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topbar-brand {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-1);
            white-space: nowrap;
        }

        .topbar-brand span { color: var(--accent-l); }

        .topbar-badge {
            font-size: .62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(13,148,136,.25);
        }

        .menu-toggle {
            display: none;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-2);
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1.1rem;
            transition: all .2s;
        }

        .menu-toggle:hover { border-color: var(--accent); color: var(--accent-l); }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-link {
            font-size: .82rem;
            color: var(--text-2);
            transition: color .2s;
            white-space: nowrap;
        }

        .topbar-link:hover { color: var(--accent-l); text-decoration: none; }
        .topbar-link i { margin-right: 5px; }

        .btn-save-top {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }

        .btn-save-top:hover { background: var(--accent-l); }
        .btn-save-top:active { transform: scale(.97); }

        .btn-logout {
            padding: 9px 16px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-2);
            border-radius: var(--radius-sm);
            font-size: .82rem;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .btn-logout:hover { border-color: var(--red); color: var(--red); }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: var(--topbar-h);
            left: 0;
            bottom: 0;
            width: var(--sidebar-w);
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            z-index: 90;
            transition: transform .3s cubic-bezier(.4,0,.2,1);
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .sidebar-header {
            padding: 24px 20px 12px;
            font-size: .68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            color: var(--text-3);
        }

        .sidebar-nav {
            list-style: none;
            padding: 0 8px 24px;
        }

        .sidebar-nav li {
            margin-bottom: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-2);
            font-size: .85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            user-select: none;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255,255,255,.03);
            color: var(--text-1);
        }

        .nav-item.active {
            background: var(--accent-glow);
            color: var(--accent-l);
            border-color: rgba(13,148,136,.2);
        }

        .nav-item i {
            width: 18px;
            text-align: center;
            font-size: .9rem;
            opacity: .7;
        }

        .nav-item.active i { opacity: 1; }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .sidebar-footer .status-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 8px;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%,100% { opacity: 1; }
            50% { opacity: .4; }
        }

        .sidebar-footer span {
            font-size: .75rem;
            color: var(--text-3);
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: var(--sidebar-w);
            margin-top: var(--topbar-h);
            padding: 32px;
            min-height: calc(100vh - var(--topbar-h));
        }

        .section-header {
            margin-bottom: 32px;
        }

        .section-header h1 {
            font-size: 1.6rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-header h1 i {
            color: var(--accent);
            font-size: 1.3rem;
        }

        .section-header p {
            color: var(--text-2);
            font-size: .88rem;
        }

        /* CARDS */
        .editor-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 28px;
            margin-bottom: 24px;
        }

        .editor-card-title {
            font-size: .95rem;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .editor-card-title i {
            color: var(--accent);
            font-size: .85rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.single {
            grid-template-columns: 1fr;
        }

        .form-col {
            display: flex;
            flex-direction: column;
        }

        .form-col label {
            font-size: .75rem;
            font-weight: 600;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 8px;
        }

        /* ARRAY ITEMS */
        .array-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .array-item {
            background: var(--bg-card-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
            position: relative;
            transition: border-color .2s;
        }

        .array-item:hover {
            border-color: rgba(255,255,255,.08);
        }

        .array-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .array-item-index {
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 3px 10px;
            border-radius: 12px;
        }

        .btn-remove {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            background: var(--red-bg);
            border: 1px solid rgba(248,81,73,.2);
            color: var(--red);
            border-radius: var(--radius-sm);
            font-size: .75rem;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-remove:hover {
            background: rgba(248,81,73,.2);
            border-color: var(--red);
        }

        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 20px;
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text-2);
            border-radius: var(--radius-md);
            font-size: .85rem;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
            width: 100%;
            justify-content: center;
            margin-top: 8px;
        }

        .btn-add:hover {
            border-color: var(--accent);
            color: var(--accent-l);
            background: var(--accent-glow);
        }

        /* FLOATING SAVE */
        .floating-save {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 200;
        }

        .floating-save button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(13,148,136,.35), 0 0 0 1px rgba(13,148,136,.3);
            transition: all .2s;
        }

        .floating-save button:hover {
            background: var(--accent-l);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(13,148,136,.45);
        }

        .floating-save button:active { transform: translateY(0); }

        .floating-save button.saving {
            pointer-events: none;
            opacity: .7;
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-size: .85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn .35s cubic-bezier(.4,0,.2,1);
            min-width: 300px;
            max-width: 440px;
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
        }

        .toast.success {
            background: var(--green-bg);
            border: 1px solid rgba(63,185,80,.3);
            color: var(--green);
        }

        .toast.error {
            background: var(--red-bg);
            border: 1px solid rgba(248,81,73,.3);
            color: var(--red);
        }

        .toast.warning {
            background: rgba(210,153,34,.12);
            border: 1px solid rgba(210,153,34,.3);
            color: var(--yellow);
        }

        .toast.leaving { animation: toastOut .3s forwards; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(40px); }
        }

        /* OVERLAY (mobile sidebar) */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 80;
        }

        .sidebar-overlay.active { display: block; }

        /* LOADING SPINNER */
        .spinner-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 96px 0;
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-3);
        }

        .empty-state i {
            font-size: 2.4rem;
            margin-bottom: 16px;
            color: var(--border);
        }

        /* ═══════════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════════ */
        @media (max-width: 1024px) {
            .form-row { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; align-items: center; justify-content: center; }

            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
                box-shadow: 8px 0 32px rgba(0,0,0,.4);
            }

            .main-content {
                margin-left: 0;
                padding: 24px 16px;
            }

            .topbar-badge { display: none; }

            .floating-save {
                bottom: 20px;
                right: 20px;
            }

            .floating-save button {
                padding: 12px 22px;
                font-size: .88rem;
            }

            .section-header h1 { font-size: 1.3rem; }

            .login-card { padding: 32px 24px; }
        }

        @media (max-width: 480px) {
            .topbar-link.hide-mobile { display: none; }
            .btn-save-top .btn-label { display: none; }
        }
    </style>
</head>
<body>

    <!-- ═══════════════════════════════════════════════════════
         LOGIN SCREEN
         ═══════════════════════════════════════════════════════ -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="login-brand">
                <div class="logo-text">gelanla<span>salim</span></div>
                <div class="logo-sub">İçerik Yönetim Sistemi</div>
            </div>
            <h2>Yönetici Girişi</h2>
            <p class="login-desc">Landing page içeriklerini düzenlemek için yönetici hesabınızla giriş yapın.</p>

            <div class="login-error" id="loginError">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="loginErrorText">Giriş bilgileri hatalı.</span>
            </div>

            <form id="loginForm" autocomplete="on">
                <div class="field-group">
                    <label for="loginEmail">E-posta Adresi</label>
                    <input type="email" id="loginEmail" placeholder="admin_test@gelanlasalim.com" required autocomplete="email">
                </div>
                <div class="field-group">
                    <label for="loginPassword">Şifre</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fa-solid fa-right-to-bracket"></i>&nbsp; Giriş Yap
                </button>
            </form>

            <div class="quick-login">
                <button type="button" onclick="quickLogin()">
                    <i class="fa-solid fa-bolt"></i>&nbsp; Demo Hesabıyla Hızlı Giriş
                </button>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         APP SHELL (hidden until auth)
         ═══════════════════════════════════════════════════════ -->
    <div id="appShell">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menü">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="topbar-brand">gelanla<span>salim</span></div>
                <div class="topbar-badge">CMS</div>
            </div>
            <div class="topbar-right">
                <a href="/" class="topbar-link hide-mobile" target="_blank">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> Siteye Dön
                </a>
                <button class="btn-save-top" onclick="saveContent()">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span class="btn-label">Kaydet</span>

            $loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>&nbsp; Giriş yapılıyor…';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: $loginEmail.value.trim(),
                        password: $loginPass.value
                    })
                });

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.message || 'E-posta veya şifre hatalı.');
                }

                const data = await res.json();
                token = data.token;
                localStorage.setItem('adminToken', token);
                showApp();
            } catch (err) {
                $loginErrTxt.textContent = err.message || 'Sunucuya bağlanılamadı.';
                $loginErr.style.display = 'flex';
            } finally {
                $loginBtn.disabled = false;
                $loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i>&nbsp; Giriş Yap';
            }
        });

        function buildSidebar() {
            $sidebarNav.innerHTML = SECTIONS.map(s =>
                `<li>
                    <div class="nav-item ${s.key === activeSection ? 'active' : ''}" data-section="${s.key}" onclick="navigateTo('${s.key}')">
                        <i class="${s.icon}"></i>
                        <span>${s.label}</span>
                    </div>
                </li>`
            ).join('');
        }

        window.navigateTo = function(key) {
            activeSection = key;
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.section === key);
            });
            renderSection();
            closeSidebar();
        };

        window.toggleSidebar = function() {
            $sidebar.classList.toggle('open');
            $overlay.classList.toggle('active');
        };

        window.closeSidebar = function() {
            $sidebar.classList.remove('open');
            $overlay.classList.remove('active');
        };

        /* ═══════════════════════════════════════════════════════
           LOAD CONTENT
           ═══════════════════════════════════════════════════════ */
        async function loadContent() {
            $main.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

            try {
                const res = await fetch('/api/cms/landing', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.status === 401) {
                    toast('Oturum süresi doldu, tekrar giriş yapın.', 'error');
                    logout();
                    return;
                }

                if (!res.ok) throw new Error('API yanıt hatası: ' + res.status);

                content = await res.json();
                renderSection();
            } catch (err) {
                console.warn('CMS API erişilemedi, varsayılan içerik kullanılıyor:', err);
                content = JSON.parse(JSON.stringify(DEFAULT_CONTENT));
                toast('API bağlantısı kurulamadı — varsayılan içerik yüklendi.', 'warning');
                renderSection();
            }
        }

        /* ═══════════════════════════════════════════════════════
           RENDER SECTION EDITOR
           ═══════════════════════════════════════════════════════ */
        function renderSection() {
            const meta = SECTIONS.find(s => s.key === activeSection);
            if (!meta || !content) return;

            const data = content[activeSection];

            let html = `
                <div class="section-header">
                    <h1><i class="${meta.icon}"></i> ${meta.label}</h1>
                    <p>${meta.desc}</p>
                </div>`;

            if (meta.isCustom && meta.key === 'pricing') {
                html += renderPricingEditor(data);
            } else if (meta.isCustom && meta.key === 'explorer') {
                html += renderExplorerEditor(data);
            } else if (meta.isArray) {
                html += renderArrayEditor(meta, data);
            } else {
                html += renderObjectEditor(meta, data);
            }

            $main.innerHTML = html;
        }

        /* ─── Object Editor (hero, trustStrip, footer) ─── */
        function renderObjectEditor(meta, obj) {
            const keys = Object.keys(obj);
            let html = '<div class="editor-card"><div class="editor-card-title"><i class="fa-solid fa-pen-to-square"></i> Alanları Düzenle</div>';

            // group into rows of 2
            for (let i = 0; i < keys.length; i += 2) {
                const isSingle = i + 1 >= keys.length;
                const isWide1 = FIELD_TYPES[keys[i]] === 'textarea';
                const isWide2 = !isSingle && FIELD_TYPES[keys[i+1]] === 'textarea';

                if (isWide1 || isWide2 || isSingle) {
                    // render each as single
                    html += renderFieldRow(meta.key, keys[i], obj[keys[i]], true);
                    if (!isSingle) {
                        html += renderFieldRow(meta.key, keys[i+1], obj[keys[i+1]], true);
                    }
                } else {
                    html += `<div class="form-row">`;
                    html += renderFieldCol(meta.key, keys[i], obj[keys[i]]);
                    html += renderFieldCol(meta.key, keys[i+1], obj[keys[i+1]]);
                    html += `</div>`;
                }
            }

            html += '</div>';
            return html;
        }

        function renderFieldRow(sectionKey, fieldKey, value, single) {
            const isTextarea = FIELD_TYPES[fieldKey] === 'textarea';
            const label = FIELD_LABELS[fieldKey] || fieldKey;
            const id = `field_${sectionKey}_${fieldKey}`;

            return `<div class="form-row ${single ? 'single' : ''}">
                <div class="form-col">
                    <label for="${id}">${label}</label>
                    ${isTextarea
                        ? `<textarea class="cms-textarea" id="${id}" data-section="${sectionKey}" data-field="${fieldKey}" oninput="updateField(this)">${escHtml(value)}</textarea>`
                        : `<input class="cms-input" id="${id}" type="text" value="${escAttr(value)}" data-section="${sectionKey}" data-field="${fieldKey}" oninput="updateField(this)">`
                    }
                </div>
            </div>`;
        }

        function renderFieldCol(sectionKey, fieldKey, value) {
            const label = FIELD_LABELS[fieldKey] || fieldKey;
            const id = `field_${sectionKey}_${fieldKey}`;
            return `<div class="form-col">
                <label for="${id}">${label}</label>
                <input class="cms-input" id="${id}" type="text" value="${escAttr(value)}" data-section="${sectionKey}" data-field="${fieldKey}" oninput="updateField(this)">
            </div>`;
        }

        /* ─── Array Editor ─── */
        function renderArrayEditor(meta, arr) {
            let html = '<div class="array-list">';

            arr.forEach((item, idx) => {
                html += `<div class="array-item" data-index="${idx}">
                    <div class="array-item-header">
                        <span class="array-item-index">${meta.label} #${idx + 1}</span>
                        <button class="btn-remove" onclick="removeItem('${meta.key}', ${idx})">
                            <i class="fa-solid fa-trash-can"></i> Sil
                        </button>
                    </div>`;

                const fields = meta.fields;
                // pair fields into rows of 2
                for (let fi = 0; fi < fields.length; fi += 2) {
                    const f1 = fields[fi];
                    const f2 = fields[fi + 1];
                    const isWide1 = FIELD_TYPES[f1] === 'textarea';
                    const isSingle = !f2;
                    const isWide2 = f2 && FIELD_TYPES[f2] === 'textarea';

                    if (isWide1 || isSingle) {
                        html += renderArrayField(meta.key, idx, f1, item[f1], true);
                        if (f2) {
                            html += renderArrayField(meta.key, idx, f2, item[f2], isWide2);
                        }
                    } else if (isWide2) {
                        html += renderArrayField(meta.key, idx, f1, item[f1], false);
                        html += renderArrayField(meta.key, idx, f2, item[f2], true);
                    } else {
                        html += `<div class="form-row">`;
                        html += renderArrayFieldCol(meta.key, idx, f1, item[f1]);
                        if (f2) html += renderArrayFieldCol(meta.key, idx, f2, item[f2]);
                        html += `</div>`;
                    }
                }

                html += '</div>';
            });

            html += `</div>
                <button class="btn-add" onclick="addItem('${meta.key}')">
                    <i class="fa-solid fa-plus"></i> Yeni ${meta.label} Ekle
                </button>`;
            return html;
        }

        function renderArrayField(sectionKey, idx, fieldKey, value, wide) {
            const isTextarea = FIELD_TYPES[fieldKey] === 'textarea';
            const label = FIELD_LABELS[fieldKey] || fieldKey;
            const id = `arr_${sectionKey}_${idx}_${fieldKey}`;

            return `<div class="form-row ${wide ? 'single' : ''}">
                <div class="form-col">
                    <label for="${id}">${label}</label>
                    ${isTextarea
                        ? `<textarea class="cms-textarea" id="${id}" data-section="${sectionKey}" data-index="${idx}" data-field="${fieldKey}" oninput="updateArrayField(this)">${escHtml(value || '')}</textarea>`
                        : `<input class="cms-input" id="${id}" type="text" value="${escAttr(value || '')}" data-section="${sectionKey}" data-index="${idx}" data-field="${fieldKey}" oninput="updateArrayField(this)">`
                    }
                </div>
            </div>`;
        }

        function renderArrayFieldCol(sectionKey, idx, fieldKey, value) {
            const label = FIELD_LABELS[fieldKey] || fieldKey;
            const id = `arr_${sectionKey}_${idx}_${fieldKey}`;
            return `<div class="form-col">
                <label for="${id}">${label}</label>
                <input class="cms-input" id="${id}" type="text" value="${escAttr(value || '')}" data-section="${sectionKey}" data-index="${idx}" data-field="${fieldKey}" oninput="updateArrayField(this)">
            </div>`;
        }

        /* ═══════════════════════════════════════════════════════
           DATA BINDING
           ═══════════════════════════════════════════════════════ */
        window.updateField = function(el) {
            const section = el.dataset.section;
            const field = el.dataset.field;
            content[section][field] = el.value;
        };

        window.updateArrayField = function(el) {
            const section = el.dataset.section;
            const idx = parseInt(el.dataset.index, 10);
            const field = el.dataset.field;
            content[section][idx][field] = el.value;
        };

        window.removeItem = function(sectionKey, idx) {
            if (!confirm('Bu öğeyi silmek istediğinize emin misiniz?')) return;
            content[sectionKey].splice(idx, 1);
            renderSection();
            toast('Öğe silindi.', 'warning');
        };

        window.addItem = function(sectionKey) {
            const meta = SECTIONS.find(s => s.key === sectionKey);
            if (!meta) return;
            const newItem = {};
            meta.fields.forEach(f => { newItem[f] = ''; });
            content[sectionKey].push(newItem);
            renderSection();

            // scroll to new item
            requestAnimationFrame(() => {
                const items = document.querySelectorAll('.array-item');
                const last = items[items.length - 1];
                if (last) last.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        };

        /* ═══════════════════════════════════════════════════════
           PRICING EDITOR (Custom)
           ═══════════════════════════════════════════════════════ */
        function renderPricingEditor(data) {
            if (!data) data = DEFAULT_CONTENT.pricing;
            let html = '';

            // Badge field
            html += `<div class="editor-card"><div class="editor-card-title"><i class="fa-solid fa-bullhorn"></i> Lansman Banner</div>
                <div class="form-row single"><div class="form-col">
                    <label for="pricing_badge">Banner Metni</label>
                    <input class="cms-input" id="pricing_badge" type="text" value="${escAttr(data.badge || '')}" oninput="content.pricing.badge=this.value">
                </div></div>
            </div>`;

            // Plan cards
            html += '<div class="array-list">';
            (data.plans || []).forEach((plan, idx) => {
                const hl = plan.highlighted ? 'checked' : '';
                html += `<div class="array-item" data-index="${idx}" style="border-left:3px solid ${plan.highlighted ? 'var(--accent)' : 'var(--border)'}">
                    <div class="array-item-header">
                        <span class="array-item-index"><i class="fa-solid fa-credit-card"></i> ${plan.name || 'Plan'} #${idx+1}</span>
                        <button class="btn-remove" onclick="removePlan(${idx})"><i class="fa-solid fa-trash-can"></i> Sil</button>
                    </div>
                    <div class="form-row">
                        <div class="form-col"><label>Plan Adı</label><input class="cms-input" value="${escAttr(plan.name || '')}" oninput="content.pricing.plans[${idx}].name=this.value"></div>
                        <div class="form-col"><label>Fiyat</label><input class="cms-input" value="${escAttr(plan.price || '')}" oninput="content.pricing.plans[${idx}].price=this.value"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-col"><label>Dönem</label><input class="cms-input" value="${escAttr(plan.period || '')}" oninput="content.pricing.plans[${idx}].period=this.value"></div>
                        <div class="form-col"><label>CTA Buton Metni</label><input class="cms-input" value="${escAttr(plan.cta || '')}" oninput="content.pricing.plans[${idx}].cta=this.value"></div>
                    </div>
                    <div class="form-row single"><div class="form-col">
                        <label>Açıklama</label>
                        <textarea class="cms-textarea" oninput="content.pricing.plans[${idx}].desc=this.value">${escHtml(plan.desc || '')}</textarea>
                    </div></div>
                    <div class="form-row single"><div class="form-col">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                            <input type="checkbox" ${hl} onchange="content.pricing.plans[${idx}].highlighted=this.checked;renderSection()" style="width:18px;height:18px;accent-color:var(--accent)">
                            <span>Öne Çıkan (Highlighted) Plan</span>
                        </label>
                    </div></div>
                    <div class="form-row single"><div class="form-col">
                        <label>Özellikler <span style="color:var(--text-3);font-weight:400">(her satır bir özellik)</span></label>
                        <textarea class="cms-textarea" rows="4" oninput="content.pricing.plans[${idx}].features=this.value.split('\n').filter(l=>l.trim())">${(plan.features || []).join('\n')}</textarea>
                    </div></div>
                </div>`;
            });
            html += '</div>';

            html += `<button class="btn-add" onclick="addPlan()"><i class="fa-solid fa-plus"></i> Yeni Plan Ekle</button>`;
            return html;
        }

        window.removePlan = function(idx) {
            if (!confirm('Bu planı silmek istediğinize emin misiniz?')) return;
            if (!content.pricing) content.pricing = JSON.parse(JSON.stringify(DEFAULT_CONTENT.pricing));
            content.pricing.plans.splice(idx, 1);
            renderSection();
            toast('Plan silindi.', 'warning');
        };

        window.addPlan = function() {
            if (!content.pricing) content.pricing = JSON.parse(JSON.stringify(DEFAULT_CONTENT.pricing));
            content.pricing.plans.push({ name: 'Yeni Plan', price: '0', period: 'aylık', desc: '', features: [], cta: 'Başla', highlighted: false });
            renderSection();
            requestAnimationFrame(() => {
                const items = document.querySelectorAll('.array-item');
                const last = items[items.length - 1];
                if (last) last.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        };

        /* ═══════════════════════════════════════════════════════
           EXPLORER EDITOR (Custom)
           ═══════════════════════════════════════════════════════ */
        function renderExplorerEditor(data) {
            if (!data) data = DEFAULT_CONTENT.explorer;
            let html = '';

            // Title & Subtitle Card
            html += `<div class="editor-card"><div class="editor-card-title"><i class="fa-solid fa-heading"></i> Başlıklar</div>
                <div class="form-row">
                    <div class="form-col"><label>Gezgin Başlığı</label><input class="cms-input" value="${escAttr(data.title || '')}" oninput="content.explorer.title=this.value"></div>
                    <div class="form-col"><label>Açıklama / Alt Başlık</label><input class="cms-input" value="${escAttr(data.subtitle || '')}" oninput="content.explorer.subtitle=this.value"></div>
                </div>
            </div>`;

            // Daily Stats Card
            html += `<div class="editor-card"><div class="editor-card-title"><i class="fa-solid fa-chart-line"></i> Günlük Arama İstatistikleri</div>`;
            (data.dailyStats || []).forEach((stat, idx) => {
                html += `<div class="form-row" style="margin-bottom:12px">
                    <div class="form-col"><label>İstatistik Etiketi</label><input class="cms-input" value="${escAttr(stat.label || '')}" oninput="content.explorer.dailyStats[${idx}].label=this.value"></div>
                    <div class="form-col"><label>İhale Sayısı / Değer</label><input class="cms-input" value="${escAttr(stat.count || '')}" oninput="content.explorer.dailyStats[${idx}].count=this.value"></div>
                </div>`;
            });
            html += `</div>`;

            // Categories list (name, count, slug)
            html += `<div class="editor-card"><div class="editor-card-title"><i class="fa-solid fa-folder-tree"></i> İhale Kategorileri</div>
                <div class="array-list">`;
            (data.categories || []).forEach((cat, idx) => {
                html += `<div class="array-item" data-index="${idx}">
                    <div class="array-item-header">
                        <span class="array-item-index"><i class="fa-solid fa-folder"></i> Kategori #${idx+1}</span>
                        <button class="btn-remove" onclick="removeExplorerCat(${idx})"><i class="fa-solid fa-trash-can"></i> Sil</button>
                    </div>
                    <div class="form-row">
                        <div class="form-col"><label>Kategori Adı</label><input class="cms-input" value="${escAttr(cat.name || '')}" oninput="content.explorer.categories[${idx}].name=this.value"></div>
                        <div class="form-col"><label>İhale Sayısı</label><input class="cms-input" value="${escAttr(cat.count || '')}" oninput="content.explorer.categories[${idx}].count=this.value"></div>
                    </div>
                    <div class="form-row single">
                        <div class="form-col"><label>Kategori Kodu (Slug - küçük harf, örn: insaat)</label><input class="cms-input" value="${escAttr(cat.slug || '')}" oninput="content.explorer.categories[${idx}].slug=this.value"></div>
                    </div>
                </div>`;
            });
            html += `</div>
                <button class="btn-add" onclick="addExplorerCat()"><i class="fa-solid fa-plus"></i> Yeni Kategori Ekle</button>
            </div>`;

            // Cities, Sectors & Types textareas
            html += `<div class="editor-card"><div class="editor-card-title"><i class="fa-solid fa-globe"></i> Şehirler, Sektörler & İhale Türleri</div>
                <div class="form-row">
                    <div class="form-col">
                        <label>Filtrelenecek Şehirler (her satıra bir şehir)</label>
                        <textarea class="cms-textarea" rows="6" oninput="content.explorer.cities=this.value.split('\\n').filter(l=>l.trim())">${(data.cities || []).join('\n')}</textarea>
                    </div>
                    <div class="form-col">
                        <label>Filtrelenecek Sektörler (her satıra bir sektör)</label>
                        <textarea class="cms-textarea" rows="6" oninput="content.explorer.sectors=this.value.split('\\n').filter(l=>l.trim())">${(data.sectors || []).join('\n')}</textarea>
                    </div>
                    <div class="form-col">
                        <label>İhale Türleri (her satıra bir tür)</label>
                        <textarea class="cms-textarea" rows="6" oninput="content.explorer.types=this.value.split('\\n').filter(l=>l.trim())">${(data.types || []).join('\n')}</textarea>
                    </div>
                </div>
            </div>`;

            return html;
        }

        window.removeExplorerCat = function(idx) {
            if (!confirm('Bu kategoriyi silmek istediğinize emin misiniz?')) return;
            if (!content.explorer) content.explorer = JSON.parse(JSON.stringify(DEFAULT_CONTENT.explorer));
            content.explorer.categories.splice(idx, 1);
            renderSection();
            toast('Kategori silindi.', 'warning');
        };

        window.addExplorerCat = function() {
            if (!content.explorer) content.explorer = JSON.parse(JSON.stringify(DEFAULT_CONTENT.explorer));
            if (!content.explorer.categories) content.explorer.categories = [];
            content.explorer.categories.push({ name: 'Yeni Kategori', count: '0', slug: 'yeni-kategori' });
            renderSection();
            requestAnimationFrame(() => {
                const items = document.querySelectorAll('.array-item');
                const last = items[items.length - 1];
                if (last) last.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        };

        /* ═══════════════════════════════════════════════════════
           SAVE
           ═══════════════════════════════════════════════════════ */
        window.saveContent = async function() {
            const btn = document.getElementById('floatingSaveBtn');
            btn.classList.add('saving');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Kaydediliyor…';

            try {
                const res = await fetch('/api/cms/landing', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(content)
                });

                if (res.status === 401) {
                    toast('Oturum süresi doldu, tekrar giriş yapın.', 'error');
                    logout();
                    return;
                }

                if (!res.ok) throw new Error('Kaydetme başarısız: ' + res.status);

                toast('İçerik başarıyla kaydedildi!', 'success');
            } catch (err) {
                toast(err.message || 'Kaydetme sırasında bir hata oluştu.', 'error');
            } finally {
                btn.classList.remove('saving');
                btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Değişiklikleri Kaydet';
            }
        };

        /* ═══════════════════════════════════════════════════════
           TOAST
           ═══════════════════════════════════════════════════════ */
        function toast(msg, type) {
            const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', warning: 'fa-triangle-exclamation' };
            const el = document.createElement('div');
            el.className = `toast ${type || 'success'}`;
            el.innerHTML = `<i class="fa-solid ${icons[type] || icons.success}"></i> ${escHtml(msg)}`;
            $toastCont.appendChild(el);

            setTimeout(() => {
                el.classList.add('leaving');
                el.addEventListener('animationend', () => el.remove());
            }, 4000);
        }

        /* ─── Helpers ─── */
        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function escAttr(s) {
            return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

    })();
    </script>

</body>
</html>
